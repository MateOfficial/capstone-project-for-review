services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: storeflow
      POSTGRES_USER: storeflow
      POSTGRES_PASSWORD: storeflow
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U storeflow"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/storeflow
      SPRING_DATASOURCE_USERNAME: storeflow
      SPRING_DATASOURCE_PASSWORD: storeflow
      SPRING_DATA_REDIS_HOST: redis
      JWT_SECRET: change-me-in-production-use-a-long-random-string
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  pgdata:
