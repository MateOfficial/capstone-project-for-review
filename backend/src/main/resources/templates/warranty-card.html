<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <style>
        @page { size: A5 landscape; margin: 15mm; }
        body { font-family: sans-serif; font-size: 11pt; color: #222; }
        .header { text-align: center; margin-bottom: 12px; }
        .header img { max-height: 48px; max-width: 120px; object-fit: contain; margin-bottom: 6px; }
        .header h1 { font-size: 16pt; margin: 0; }
        .header p { font-size: 9pt; color: #666; margin: 2px 0; }
        .title { text-align: center; font-size: 14pt; font-weight: bold;
                  margin: 15px 0; text-transform: uppercase; }
        table { width: 100%; border-collapse: collapse; margin: 10px 0; }
        td { padding: 6px 10px; vertical-align: top; }
        .label { font-weight: bold; width: 40%; color: #444; }
        .value { width: 60%; }
        .divider { border-top: 1px solid #ddd; margin: 10px 0; }
        .footer { font-size: 8pt; color: #888; text-align: center; margin-top: 20px; }
        .number { font-family: monospace; font-size: 12pt; color: #333; }
    </style>
</head>
<body>
<div class="header">
    <img th:if="${store.logoUrl}" th:src="${store.logoUrl}" alt="logo"/>
    <h1 th:text="${store.name}">Store Name</h1>
    <p th:text="${store.address}" th:if="${store.address}">Address</p>
    <p th:text="'Тел: ' + ${store.phone}" th:if="${store.phone}">Phone</p>
</div>

<div class="title">Гарантийный талон</div>
<div style="text-align: center;">
    <span class="number" th:text="'№ ' + ${number}">№ W-XXXXXX</span>
</div>

<div class="divider"></div>

<table>
    <tr th:if="${brand}">
        <td class="label">Бренд:</td>
        <td class="value" th:text="${brand}">Brand</td>
    </tr>
    <tr>
        <td class="label">Товар:</td>
        <td class="value" th:text="${product}">Product</td>
    </tr>
    <tr>
        <td class="label">Серийный номер:</td>
        <td class="value" th:text="${serial}">Serial</td>
    </tr>
    <tr>
        <td class="label">Покупатель:</td>
        <td class="value" th:text="${client}">Client</td>
    </tr>
    <tr>
        <td class="label">Телефон:</td>
        <td class="value" th:text="${phone}">Phone</td>
    </tr>
    <tr>
        <td class="label">Дата покупки:</td>
        <td class="value" th:text="${purchaseDate}">01.01.2026</td>
    </tr>
    <tr>
        <td class="label">Срок гарантии:</td>
        <td class="value" th:text="${duration} + ' мес.'">12 мес.</td>
    </tr>
    <tr>
        <td class="label">Действителен до:</td>
        <td class="value" th:text="${expirationDate}">01.01.2027</td>
    </tr>
</table>

<div class="divider"></div>

<div class="footer">
    Документ сформирован автоматически системой StoreFlow.
</div>
</body>
</html>
