<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <style>
        @page { size: A4; margin: 20mm; }
        body { font-family: sans-serif; font-size: 11pt; color: #222; }
        .header { text-align: center; margin-bottom: 15px; }
        .header h1 { font-size: 16pt; margin: 0; }
        .header p { font-size: 9pt; color: #666; margin: 2px 0; }
        .title { text-align: center; font-size: 14pt; font-weight: bold;
                  margin: 20px 0; text-transform: uppercase; }
        table { width: 100%; border-collapse: collapse; margin: 10px 0; }
        td { padding: 6px 10px; vertical-align: top; }
        .label { font-weight: bold; width: 35%; color: #444; }
        .value { width: 65%; }
        .divider { border-top: 1px solid #ddd; margin: 12px 0; }
        .footer { font-size: 8pt; color: #888; text-align: center; margin-top: 30px; }
        .sig-line { border-top: 1px solid #333; width: 200px; display: inline-block;
                    margin-top: 40px; text-align: center; font-size: 9pt; color: #666; }
    </style>
</head>
<body>
<div class="header">
    <h1 th:text="${store.name}">Store Name</h1>
    <p th:text="${store.address}" th:if="${store.address}">Address</p>
    <p th:text="'Тел: ' + ${store.phone}" th:if="${store.phone}">Phone</p>
</div>

<div class="title">Акт выдачи товара</div>
<div style="text-align: center; font-family: monospace;" th:text="'№ ' + ${actNumber}">
    № ACT-XXXXXXXXXX
</div>

<div class="divider"></div>

<table>
    <tr>
        <td class="label">Покупатель:</td>
        <td class="value" th:text="${client}">Client</td>
    </tr>
    <tr>
        <td class="label">Телефон:</td>
        <td class="value" th:text="${phone}">Phone</td>
    </tr>
    <tr>
        <td class="label">Товар:</td>
        <td class="value" th:text="${items}">Items</td>
    </tr>
    <tr>
        <td class="label">Сумма:</td>
        <td class="value" th:text="${#numbers.formatDecimal(total, 0, 'COMMA', 0, 'POINT')} + ' сум'">0 сум</td>
    </tr>
    <tr th:if="${notes != null and !notes.isEmpty()}">
        <td class="label">Примечания:</td>
        <td class="value" th:text="${notes}">Notes</td>
    </tr>
</table>

<div class="divider"></div>

<div style="display: flex; justify-content: space-between; margin-top: 30px;">
    <div>
        <div class="sig-line">Подпись продавца</div>
    </div>
    <div>
        <div class="sig-line">Подпись покупателя</div>
    </div>
</div>

<div class="footer">
    Документ сформирован автоматически системой StoreFlow.
</div>
</body>
</html>
